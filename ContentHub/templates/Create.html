
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account - ContentHub</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{
background:#121212;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.card{
width:420px;
background:#1e1e1e;
border-radius:16px;
padding:35px;
border:1px solid #2f2f2f;
}

.title{
text-align:center;
font-size:28px;
font-weight:bold;
margin-bottom:15px;
}

.progress{
height:8px;
background:#333;
border-radius:10px;
overflow:hidden;
margin-bottom:15px;
}

.progress-bar{
width:25%;
height:100%;
background:#9eff00;
}

label{display:block;margin-top:15px;font-size:14px}

input{
width:100%;
padding:12px;
margin-top:6px;
border-radius:8px;
border:1px solid #3a3a3a;
background:#121212;
color:white;
}

.password-hints{
font-size:12px;
color:#9ca3af;
margin-top:5px;
}
/*
.checkbox-container{
display:flex;
gap:5px;
margin-top:15px;
font-size:14px;
}*/
.checkbox-container {
  display: flex;
  align-items: center;
  margin-top: 15px;
  font-size: 14px;
  gap: 5px;
}

.checkbox-container a {
  text-decoration: underline;
  color: #9eff00;
}



button{
width:100%;
padding:12px;
margin-top:20px;
background:#9eff00;
color:#121212;
font-weight:bold;
border:none;
border-radius:8px;
cursor:pointer;
opacity:.5;
}

.footer{
margin-top:15px;
text-align:center;
font-size:14px;
color:#9ca3af;
}

.footer a{color:#9eff00;text-decoration:none}

/* toast */
.toast{
position:fixed;
top:30px;
right:-400px;
background:#ff4d4d;
padding:15px 25px;
border-radius:10px;
font-weight:bold;
transition:.5s;
}

.toast.show{right:30px}

.match-text{font-size:13px;margin-top:6px}

/* borders */
.error-border{border:1px solid #ff4d4d !important;box-shadow:0 0 8px #ff4d4d}
.success-border{border:1px solid #9eff00 !important;box-shadow:0 0 8px #9eff00}

/* shake */
.shake{animation:shake .4s}
@keyframes shake{
0%{transform:translateX(0)}
25%{transform:translateX(-5px)}
50%{transform:translateX(5px)}
75%{transform:translateX(-5px)}
100%{transform:translateX(0)}
}
</style>
</head>

<body>

<div class="toast" id="toast">❌ Password does not match</div>

<div class="card">
<div class="title">Create your account</div>

<div class="progress"><div class="progress-bar"></div></div>
<div style="text-align:center; font-size: 13px; color:#9ca3af; margin-bottom:15px;">Step 1 of 4</div>


<form  method="post">
  <label>Name</label>
  <input type="text" name="name" id="email" placeholder="username" required>
<label>Email</label>
<input type="email" name="email" id="email" placeholder="you@domain.com" required>

<label>Password</label>
<input type="password" name="password" id="password" placeholder="Enter password" required>
<div class="password-hints">
    <div>• At least 8 characters</div>
    <div>• Include a number and a symbol</div>
    <div>• Avoid common or reused passwords</div>
</div>

<label>Confirm Password</label>
<input type="password" name="confirm_password" id="confirm-password" placeholder="Confirm password">

<div class="match-text" id="match"></div>

<div class="checkbox-container">
    <input type="checkbox" id="terms">
    <label for="terms">I agree to the <a href="#">Terms</a> and <a href="#">Privacy Policy</a>.</label>
</div>

<button type="submit" id="btn">Create Account</button>

</form>

<div class="footer">
Already have an account? <a href="{{url_for('sign')}}">Sign in</a>
</div>

</div>

<script>

let p1=password;
let p2=document.getElementById("confirm-password");
let match=document.getElementById("match");
let btn=document.getElementById("btn");
let toast=document.getElementById("toast");
let terms=document.getElementById("terms");

btn.disabled=true;

function check(){

if(p2.value==="") return;

if(p1.value===p2.value){
match.innerHTML="✅ Password matched";
match.style.color="#9eff00";
p1.classList.remove("error-border");
p2.classList.remove("error-border");
p1.classList.add("success-border");
p2.classList.add("success-border");
btn.disabled=false;
btn.style.opacity="1";
}else{
match.innerHTML="❌ Password not match";
match.style.color="#ff4d4d";
p1.classList.add("error-border");
p2.classList.add("error-border");
btn.disabled=true;
btn.style.opacity=".5";
}
}

p1.onkeyup=check;
p2.onkeyup=check;

form.onsubmit=function(e){
e.preventDefault();

if(p1.value!==p2.value || !terms.checked){

p1.classList.add("shake");
p2.classList.add("shake");

toast.innerHTML = !terms.checked ? "❌ Accept terms first" : "❌ Password does not match";
toast.classList.add("show");

setTimeout(()=>{
toast.classList.remove("show");
p1.classList.remove("shake");
p2.classList.remove("shake");
},2000);

return;
}

alert("🎉 Account Created Successfully");

}
</script>

</body>
</html>
