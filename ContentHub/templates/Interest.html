<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ContentHub - Interests</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter, Arial, sans-serif;
    }
    
    body{
    background:#121212;
    display:flex;
    align-items:center;
    justify-content:center;
    height:100vh;
    color:white;
    }
    
    .wrapper{
    width:100%;
    display:flex;
    justify-content:center;
    }
    
    .card{
    background:#1e1e1e;
    padding:40px;
    border-radius:16px;
    width:650px;
    text-align:center;
    }
    
    /* top bar */
    
    .top-bar{
    display:flex;
    justify-content:space-between;
    color:#a8a8a8;
    font-size:14px;
    margin-bottom:10px;
    }
    
    /* progress */
    
    .progress{
    width:100%;
    height:8px;
    background:#333;
    border-radius:10px;
    margin-bottom:25px;
    }
    
    .progress-fill{
    width:50%;
    height:100%;
    background:#9eff00;
    border-radius:10px;
    }
    
    /* headings */
    
    h1{
    font-size:32px;
    margin-bottom:10px;
    }
    
    p{
    color:#a8a8a8;
    margin-bottom:30px;
    }
    
    /* interest tags */
    
    .interests{
    display:flex;
    flex-wrap:wrap;
    gap:12px;
    justify-content:center;
    margin-bottom:30px;
    }
    
    .interests button{
    background:#9eff00;
    border:none;
    padding:10px 18px;
    border-radius:20px;
    font-size:14px;
    cursor:pointer;
    color:#111;
    font-weight:500;
    }
    
    .interests button:hover{
    opacity:0.9;
    }
    
    /* actions */
    
    .actions{
    display:flex;
    justify-content:space-between;
    }
    
    .skip{
    background:#fff;
    color:#111;
    border:none;
    padding:10px 20px;
    border-radius:8px;
    font-weight:600;
    }
    
    .continue{
    background:#9eff00;
    border:none;
    padding:12px 24px;
    border-radius:8px;
    font-weight:700;
    color:#111;
    }
    .actions{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:20px;
}

.skip{
background:#fff;
color:#111;
border:none;
padding:10px 20px;
border-radius:8px;
font-weight:600;
cursor:pointer;
}

.continue{
background:#9eff00;
border:none;
padding:12px 24px;
border-radius:8px;
font-weight:700;
color:#111;
cursor:pointer;
}

</style>
</head>

<body>

<div class="wrapper">

<div class="card">

<div class="top-bar">
<span>Step 2 of 4</span>
<span>50%</span>
</div>

<div class="progress">
<div class="progress-fill"></div>
</div>

<h1>What are you interested in?</h1>

<p>Select at least 3 interests to help us personalize your feed.</p>




<form id="interestForm" method="POST">

    <div class="interests">
        <button type="button" class="interest" value="Technology">Technology</button>
        <button type="button" class="interest" value="Design">Design</button>
        <button type="button" class="interest" value="Marketing">Marketing</button>
        <button type="button" class="interest" value="Productivity">Productivity</button>
        <button type="button" class="interest" value="Business">Business</button>
        <button type="button" class="interest" value="Finance">Finance</button>
        <button type="button" class="interest" value="Health">Health & Fitness</button>
        <button type="button" class="interest" value="Travel">Travel</button>
        <button type="button" class="interest" value="Food">Food & Drink</button>
        <button type="button" class="interest" value="Books">Books</button>
        <button type="button" class="interest" value="Movies">Movies</button>
        <button type="button" class="interest" value="Music">Music</button>
    
    
    </div>
    
    <input type="hidden" name="interest" id="selectedInterests" >
    
    <div class="actions">
        <!-- SKIP -->
        <button type="button"  class="skip"  onclick="window.location.href='/item'">Skip</button>
    
        <!-- CONTINUE -->
        <button type="submit" class="continue">Continue</button>
    </div>
    
    </form>
    
    <script>
    let selected = []
    
    document.querySelectorAll(".interest").forEach(btn => {
        btn.onclick = function(){
            let val = this.value
    
            if(selected.includes(val)){
                selected = selected.filter(i => i !== val)
                this.style.background = "#9eff00"
            }else{
                selected.push(val)
                this.style.background = "#00c853"
            }
    
            document.getElementById("selectedInterests").value = selected.join(",")
        }
    })
    
    document.getElementById("interestForm").onsubmit = function(e){
        if(selected.length < 3){
            e.preventDefault()
            alert("Select at least 3 interests")
        }
    }
    </script>
        

    </body>
    </html>
