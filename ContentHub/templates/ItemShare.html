<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ContentHub -Smart Feed </title>

<style>


*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, sans-serif;
background:#121212;
color:#f0f0f0;
}


.top-bar{
display:flex;
align-items:center;
gap:20px;
padding:12px 20px;
background:#0d0d0d;
border-bottom:1px solid #9eff00;
}

.nav-btn{
text-decoration:none;
color:white;
padding:6px 12px;
border-radius:6px;
transition:0.2s;
}

.nav-btn:hover{
background:#9eff00;
color:black;
text-decoration:none;
}

.search{
background:#1a1a1a;
border:1px solid #444;
border-radius:20px;
padding:6px 12px;
color:white;
}

.logo{
margin-left:auto;
font-weight:bold;
color:#9eff00;
font-size:18px;
}

/* MAIN LAYOUT */
.main{
display:flex;
}

/* SIDEBAR */
.sidebar{
width:260px;
background:#191919;
border-right:1px solid #223149;
display:flex;
flex-direction:column;
padding:20px;
gap:10px;
min-height:100vh;
}

.sidebar button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#191919;
color:white;
text-align:left;
cursor:pointer;
transition:0.2s;
}

.sidebar button:hover{
background:#9eff00;
color:black;
}

.sidebar .active button{
    background:#9eff00;
    color:black;
    font-weight:bold;
    }

.upgrade-btn{
margin-top:auto;
background:#9eff00;
color:black;
font-weight:bold;
}

/* CONTENT AREA */
.container{
flex:1;
padding:40px;
}

.policy-box{
max-width:900px;
margin:auto;
background:#1c1c1c;
padding:30px;
border-radius:12px;
border:1px solid #2a2a2a;
}

h1{
color:#9eff00;
margin-bottom:20px;
text-align:center;
}

h2{
color:#98fb29;
margin-top:25px;
margin-bottom:10px;
}

p{
line-height:1.6;
margin-bottom:12px;
}

ul{
margin-left:20px;
margin-bottom:15px;
}

a{
color:#9eff00;
text-decoration:none;
}

a:hover{
text-decoration:underline;
}

/* ---------- MAIN AREA ---------- */

.main{
flex:1;
padding:30px;
display:flex;
gap:30px;
flex-wrap:wrap;
}

/* ---------- CARDS ---------- */

.card{
background:#262626;
border:1px solid #333;
border-radius:12px;
padding:20px;
width:550px;
}

.card-title{
font-size:18px;
font-weight:bold;
margin-bottom:15px;
}

/* ---------- PREVIEW ---------- */

.preview-image{
height:220px;
background:#9eff00;
border-radius:6px;
margin-bottom:15px;
}

.article-title{
font-size:22px;
font-weight:bold;
margin-bottom:6px;
}

.site{
font-size:14px;
color:#98989a;
margin-bottom:10px;
}

.description{
margin-bottom:6px;
color:#e6e6e6;
}

.rebuild{
margin-top:15px;
background:#333;
padding:10px;
border-radius:8px;
text-align:center;
cursor:pointer;
}

/* ---------- FORMAT SECTION ---------- */

.format-buttons{
display:flex;
gap:10px;
margin-bottom:20px;
}

.format-btn{
background:#333;
border:none;
color:white;
padding:8px 14px;
border-radius:8px;
cursor:pointer;
}

.divider{
height:1px;
background:#333;
margin:15px 0;
}

.toggle{
display:flex;
width:200px;
background:#191919;
border:1px solid #333;
border-radius:8px;
padding:4px;
margin-bottom:15px;
}

.toggle button{
flex:1;
border:none;
background:none;
padding:6px;
color:#aaa;
cursor:pointer;
}

.toggle .active{
background:#333;
color:white;
border-radius:6px;
}

.copy-btn{
width:100%;
height:40px;
border:none;
border-radius:8px;
background:linear-gradient(#9eff00,#b1ff33);
font-weight:bold;
cursor:pointer;
margin-bottom:10px;
}

.output{
width:100%;
height:170px;
background:#191919;
border:1px solid #333;
border-radius:8px;
padding:10px;
color:#e6e6e6;
resize:none;
}

/* ---------- SHARE ---------- */

.share-buttons{
display:flex;
gap:10px;
margin-top:15px;
}

.share-btn{
flex:1;
background:#333;
border:none;
border-radius:8px;
height:40px;
cursor:pointer;
color:#e6e6e6;
}

.share-btn:hover{
background:#444;
}
a.btn{
    text-decoration:none;
}


.user-profile{
    display:flex;
    align-items:center;
    gap:12px;
    margin-bottom:20px;
    padding-bottom:15px;
    border-bottom:1px solid #333;
}

.profile-pic{
    width:45px;
    height:45px;
    border-radius:50%;
    object-fit:cover;
    border:2px solid #9eff00;
}

.user-name{
    font-weight:bold;
    font-size:16px;
}

.edit-profile{
    font-size:12px;
    color:#9eff00;
}




:root{
    --bg:#121212;
    --card:#1c1c1c;
    --border:#333;
    --text:#fff;
    --muted:#aaa;
    --chip:#262626;
    --chip-hover:#333;
    --accent:#9eff00;
}

/* LAYOUT */
.ai-box{
    max-width:800px;
    margin:80px auto;
    text-align:center;
    color:var(--text);
    font-family:system-ui;
}

/* TITLE */
.ai-title{
    font-size:32px;
    font-weight:600;
    margin-bottom:30px;

    /* gradient text */
    background:linear-gradient(90deg,#4facfe,#a855f7);
    -webkit-background-clip:text;
    background-clip:text;
    -webkit-text-fill-color:transparent;

    /* better rendering */
    display:inline-block;
    line-height:1.2;
    letter-spacing:0.5px;

    /* smoother look on dark UI */
    text-rendering:optimizeLegibility;
}

/* INPUT WRAPPER */
.ai-input{
    display:flex;
    align-items:center;
    gap:10px;
    padding:12px 15px;
    border-radius:30px;
    background:var(--card);
    border:1px solid var(--border);
    position:relative;
    max-width:700px;
    margin:0 auto;
}

/* INPUT */
.ai-input input{
    flex:1;
    background:transparent;
    border:none;
    outline:none;
    color:var(--text);
}

/* BUTTONS */
.plus-btn{
    width:34px;
    height:34px;
    border-radius:50%;
    border:none;
    background:#2a2a2a;
    color:var(--text);
    cursor:pointer;
}

/* DROPDOWN */
.menu{
    position:absolute;
    top:55px;
    left:0;
    width:220px;
    background:#fff;
    color:#000;
    border-radius:12px;
    box-shadow:0 10px 30px rgba(0,0,0,.15);
    display:none;
    overflow:hidden;
}

.menu.show{ display:block; }

.menu button{
    width:100%;
    padding:12px;
    border:none;
    background:none;
    text-align:left;
    cursor:pointer;
}

.menu button:hover{ background:#f1f1f1; }

/* CHIPS */
.chips{
    margin-top:15px;
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:10px;
}

.chips button{
    background:var(--chip);
    border:1px solid var(--border);
    padding:8px 14px;
    border-radius:20px;
    color:#ddd;
    cursor:pointer;
    transition:.2s;
}

.chips button:hover{
    background:var(--chip-hover);
}

/* CARD */
.ai-card{
    margin-top:30px;
    background:var(--card);
    padding:20px;
    border-radius:12px;
    border:1px solid var(--border);
}

/* TABS */
.tabs{
    display:flex;
    gap:10px;
    margin-bottom:15px;
}

.tab{
    flex:1;
    padding:10px;
    background:#2a2a2a;
    border:none;
    color:var(--text);
    border-radius:8px;
    cursor:pointer;
}

.tab.active{
    background:var(--accent);
    color:#000;
    font-weight:bold;
}

/* CONTENT */
.tab-content{ display:none; }
.tab-content.active{ display:block; }

/* TEXTAREA */
.output{
    width:100%;
    min-height:120px;
    background:#111;
    color:#fff;
    border:1px solid var(--border);
    border-radius:10px;
    padding:10px;
    resize:none;
}

/* SHARE BUTTONS */
.share-buttons button,
.format-buttons button{
    margin:5px;
    padding:8px 12px;
    border-radius:8px;
    border:1px solid var(--border);
    background:#222;
    color:#fff;
    cursor:pointer;
}








.file-preview{
    max-width:700px;
    margin:10px auto;
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    justify-content:center;
}

/* file chip */
.file-chip{
    display:flex;
    align-items:center;
    gap:10px;

    background:#1c1c1c;
    border:1px solid #333;
    color:#fff;

    padding:10px 12px;
    border-radius:12px;

    font-size:14px;
    max-width:250px;
    overflow:hidden;
}

.file-chip img{
    width:40px;
    height:40px;
    object-fit:cover;
    border-radius:8px;
}













</style>

<head>
<body>


<div class="top-bar">

<a href="#" class="nav-btn">Home</a>
<a href="{{ url_for('pricing') }}" class="nav-btn">Pricing</a>
<a href="{{ url_for('download') }}" class="nav-btn">Download</a>
<a href="#" class="nav-btn">About</a>

<input type="text" class="search" placeholder="Search">

<span class="logo">Content Hive</span>

</div>


<div class="main">

<!-- SIDEBAR -->
<div class="sidebar">

    <div class="user-profile">
        <img src="{{ url_for('static', filename=user['profile_pic'] if user['profile_pic'] else 'default.png') }}" class="profile-pic">
        <div>
            <div class="user-name">{{ user['name'] }}</div>
            <a href="{{ url_for('profile') }}" class="edit-profile">Edit Profile</a>
        </div>
    </div>


<a href="{{ url_for('library') }}"><button>My Library</button></a>
<a href="#" class="active"><button>Smart Feed</button></a>
<a href="{{ url_for('schedule') }}"><button>Scheduling</button></a>
<a href="{{ url_for('save') }}"><button>Save</button></a>
<a href="{{ url_for('setting') }}"><button>Settings</button></a>
<a href="{{ url_for('privacy') }}"><button >Privacy</button></a>
<a href="{{ url_for('terms') }}"><button>Terms of Service</button></a>


<button class="upgrade-btn">UPGRADE TO PRO</button>
<a href="{{ url_for('logout') }}"><button >Logout</button></a>
</div>


<!-- CONTENT -->
<div class="ai-box">

    <h1 class="ai-title">Let’s do something great today</h1>

    <!-- FILE PREVIEW (OUTSIDE INPUT = IMPORTANT FIX) -->
    <div id="filePreview" class="file-preview"></div>

    <!-- INPUT -->
    <div class="ai-input">

        <button class="plus-btn" onclick="toggleMenu()">+</button>

        <input type="text" placeholder="Ask anything">

        <div class="menu" id="menu">
            <button onclick="openFile()">📁 Upload</button>
            <button>🖼 Image</button>
            <button>💡 Thinking</button>
            <button>🔍 Research</button>
        </div>

    </div>

    <input type="file" id="fileInput" hidden>

    <!-- CHIPS -->
    <div class="chips">
        <button>✨ Design</button>
        <button>🖼️ Image</button>
        <button>📄 Doc</button>
        <button>💻 Code</button>
        <button>🎬 Video</button>
    </div>

    <!-- CARD -->
    <div class="ai-card">

        <div class="tabs">
            <button class="tab active" onclick="switchTab(event,'summary')">AI Summary</button>
            <button class="tab" onclick="switchTab(event,'rewrite')">Rewrite</button>
            <button class="tab" onclick="switchTab(event,'share')">Share</button>
        </div>

        <div class="tab-content active" id="summary">
            <textarea class="output">AI summary...</textarea>
        </div>

        <div class="tab-content" id="rewrite">
            <div class="format-buttons">
                <button>Tweet</button>
                <button>Formal</button>
                <button>Casual</button>
            </div>
            <textarea class="output">Rewrite here...</textarea>
        </div>

        <div class="tab-content" id="share">
            <div class="share-buttons">
                <button>WhatsApp</button>
                <button>Facebook</button>
                <button>Twitter</button>
            </div>
        </div>

    </div>

</div>



<script>

function switchTab(evt, tabName){

let container = evt.target.closest(".ai-card");

let tabs = container.querySelectorAll(".tab");
let contents = container.querySelectorAll(".tab-content");

tabs.forEach(t => t.classList.remove("active"));
contents.forEach(c => c.classList.remove("active"));

evt.target.classList.add("active");
container.querySelector("#" + tabName).classList.add("active");
}




function toggleMenu(){
    document.getElementById("menu").classList.toggle("show");
}

// open file picker (THIS is how local files are accessed)
function openFile(){
    document.getElementById("fileInput").click();
}

document.getElementById("fileInput").addEventListener("change", function(e){

    const file = e.target.files[0];
    const preview = document.getElementById("filePreview");

    if(!file) return;

    const reader = new FileReader();

    reader.onload = function(event){

        let chip = "";

        if(file.type.startsWith("image/")){
            chip = `
                <div class="file-chip">
                    <img src="${event.target.result}">
                    ${file.name}
                </div>
            `;
        } else {
            chip = `
                <div class="file-chip">
                    📄 ${file.name}
                </div>
            `;
        }

        preview.innerHTML = chip;
    };

    reader.readAsDataURL(file);
});
// handle selected file
function handleFile(event){
    const file = event.target.files[0];
    if(file){
        alert("Selected file: " + file.name);
        console.log(file);
    }
}

// close menu when clicking outside
document.addEventListener("click", function(e){
    const menu = document.getElementById("menu");
    const btn = document.querySelector(".plus-btn");

    if(!menu.contains(e.target) && !btn.contains(e.target)){
        menu.classList.remove("show");
    }
});













</script>










        
        

</body>
</html>
