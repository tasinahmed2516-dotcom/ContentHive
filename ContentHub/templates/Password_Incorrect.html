
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Incorrect</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: Arial, Helvetica, sans-serif;
}

body{
background:#121212;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.card{
width:400px;
background:#1e1e1e;
padding:40px;
border-radius:16px;
border:1px solid #2f2f2f;
text-align:center;
box-shadow:0 0 25px rgba(255,0,0,0.2);
animation:pop .5s ease;
}

@keyframes pop{
from{transform:scale(.7);opacity:0;}
to{transform:scale(1);opacity:1;}
}

.icon{
font-size:70px;
color:#ff4d4d;
animation:shake .6s infinite alternate;
}

@keyframes shake{
from{transform:translateX(-6px);}
to{transform:translateX(6px);}
}

.title{
font-size:28px;
font-weight:bold;
margin-top:10px;
}

.msg{
margin-top:8px;
color:#bbb;
}

button{
margin-top:25px;
width:100%;
padding:12px;
background:#ff4d4d;
border:none;
border-radius:8px;
font-size:16px;
font-weight:bold;
color:white;
cursor:pointer;
transition:.2s;
}

button:hover{
background:#e63b3b;
}
</style>

</head>
<body>

<div class="card">

<div class="icon">❌</div>

<div class="title">Password Incorrect</div>
<div class="msg">Please check your password and try again.</div>

<button onclick="goLogin()">Try Again</button>

</div>

<script>
function goLogin(){
window.location.href="{{ url_for('sign') }}";
}
</script>

</body>
</html>
