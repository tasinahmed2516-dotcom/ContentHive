<!DOCTYPE html>
<html>
<head>
    <title>Edit Content</title>

    <style>
        /* ========== THEME ========== */
        :root {
            --bg: #0d0d0d;
            --card: #1b1b1b;
            --input: #262626;
            --border: #333;
            --primary: #9eff00;
            --text: #ffffff;
            --muted: #aaa;
        }

        /* ========== GLOBAL ========== */
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: var(--bg);
            color: var(--text);

            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* ========== BACK BUTTON ========== */
        .back-btn {
            position: fixed;
            top: 15px;
            left: 15px;
            padding: 8px 12px;
            background: #2a2a2a;
            color: var(--text);
            text-decoration: none;
            border-radius: 6px;
            font-size: 14px;
            transition: 0.2s;
        }

        .back-btn:hover {
            background: var(--primary);
        }

        /* ========== CARD ========== */
        .card {
            width: 100%;
            max-width: 600px;
            background: var(--card);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        /* ========== FORM ========== */
        label {
            font-size: 12px;
            color: var(--muted);
            display: block;
            margin-top: 10px;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--input);
            color: var(--text);
            outline: none;
            transition: 0.15s;
        }

        input:focus,
        select:focus,
        textarea:focus {
            border-color: var(--primary);
        }

        textarea {
            height: 130px;
            resize: none;
        }

        /* ========== BUTTON ========== */
        .btn {
            width: 100%;
            margin-top: 15px;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: var(--primary);
            color: white;
            font-size: 15px;
            cursor: pointer;
        }

        .btn:hover {
            filter: brightness(1.1);
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 600px) {
            .card {
                margin: 15px;
                padding: 20px;
            }
        }
    </style>

</head>

<body>

<a href="/save" class="back-btn">⬅ Back</a>

<div class="card">

    <h2>✏ Edit Content</h2>

    <form action="/update/{{ item.id }}" method="POST">

        <label>Title</label>
        <input type="text" name="title" value="{{ item.title }}" required>

        <label>Category</label>
        <select name="category">
            <option {% if item.category=='Study' %}selected{% endif %}>Study</option>
            <option {% if item.category=='Programming' %}selected{% endif %}>Programming</option>
            <option {% if item.category=='Design' %}selected{% endif %}>Design</option>
            <option {% if item.category=='Business' %}selected{% endif %}>Business</option>
        </select>

        <label>Notes</label>
        <textarea name="notes">{{ item.notes }}</textarea>

        <button type="submit" class="btn">🚀 Save Changes</button>

    </form>

</div>

</body>
</html>
