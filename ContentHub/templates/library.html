<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ContentHub -Smart Feed </title>

<style>


*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, sans-serif;
background:#121212;
color:#f0f0f0;
}


.top-bar{
display:flex;
align-items:center;
gap:20px;
padding:12px 20px;
background:#0d0d0d;
border-bottom:1px solid #9eff00;
}

.nav-btn{
text-decoration:none;
color:white;
padding:6px 12px;
border-radius:6px;
transition:0.2s;
}

.nav-btn:hover{
background:#9eff00;
color:black;
text-decoration:none;
}

.search{
background:#1a1a1a;
border:1px solid #444;
border-radius:20px;
padding:6px 12px;
color:white;
}

.logo{
margin-left:auto;
font-weight:bold;
color:#9eff00;
font-size:18px;
}

/* MAIN LAYOUT */
.main{
display:flex;
}

/* SIDEBAR */
.sidebar{
width:260px;
background:#191919;
border-right:1px solid #223149;
display:flex;
flex-direction:column;
padding:20px;
gap:10px;
min-height:100vh;
}

.sidebar button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#191919;
color:white;
text-align:left;
cursor:pointer;
transition:0.2s;
}

.sidebar button:hover{
background:#9eff00;
color:black;
}

.sidebar .active button{
    background:#9eff00;
    color:black;
    font-weight:bold;
    }

.upgrade-btn{
margin-top:auto;
background:#9eff00;
color:black;
font-weight:bold;
}

/* CONTENT AREA */
.container{
flex:1;
padding:40px;
}

.policy-box{
max-width:900px;
margin:auto;
background:#1c1c1c;
padding:30px;
border-radius:12px;
border:1px solid #2a2a2a;
}

h1{
color:#9eff00;
margin-bottom:20px;
text-align:center;
}

h2{
color:#98fb29;
margin-top:25px;
margin-bottom:10px;
}

p{
line-height:1.6;
margin-bottom:12px;
}

ul{
margin-left:20px;
margin-bottom:15px;
}

a{
color:#9eff00;
text-decoration:none;
}

a:hover{
text-decoration:underline;
}

/* ---------- MAIN AREA ---------- */

.main{
flex:1;
padding:30px;
display:flex;
gap:30px;
flex-wrap:wrap;
}

/* ---------- CARDS ---------- */

.card{
background:#262626;
border:1px solid #333;
border-radius:12px;
padding:20px;
width:550px;
}

.card-title{
font-size:18px;
font-weight:bold;
margin-bottom:15px;
}

/* ---------- PREVIEW ---------- */

.preview-image{
height:220px;
background:#9eff00;
border-radius:6px;
margin-bottom:15px;
}

.article-title{
font-size:22px;
font-weight:bold;
margin-bottom:6px;
}

.site{
font-size:14px;
color:#98989a;
margin-bottom:10px;
}

.description{
margin-bottom:6px;
color:#e6e6e6;
}

.rebuild{
margin-top:15px;
background:#333;
padding:10px;
border-radius:8px;
text-align:center;
cursor:pointer;
}

/* ---------- FORMAT SECTION ---------- */

.format-buttons{
display:flex;
gap:10px;
margin-bottom:20px;
}

.format-btn{
background:#333;
border:none;
color:white;
padding:8px 14px;
border-radius:8px;
cursor:pointer;
}

.divider{
height:1px;
background:#333;
margin:15px 0;
}

.toggle{
display:flex;
width:200px;
background:#191919;
border:1px solid #333;
border-radius:8px;
padding:4px;
margin-bottom:15px;
}

.toggle button{
flex:1;
border:none;
background:none;
padding:6px;
color:#aaa;
cursor:pointer;
}

.toggle .active{
background:#333;
color:white;
border-radius:6px;
}

.copy-btn{
width:100%;
height:40px;
border:none;
border-radius:8px;
background:linear-gradient(#9eff00,#b1ff33);
font-weight:bold;
cursor:pointer;
margin-bottom:10px;
}

.output{
width:100%;
height:170px;
background:#191919;
border:1px solid #333;
border-radius:8px;
padding:10px;
color:#e6e6e6;
resize:none;
}

/* ---------- SHARE ---------- */

.share-buttons{
display:flex;
gap:10px;
margin-top:15px;
}

.share-btn{
flex:1;
background:#333;
border:none;
border-radius:8px;
height:40px;
cursor:pointer;
color:#e6e6e6;
}

.share-btn:hover{
background:#444;
}
a.btn{
    text-decoration:none;
}


.user-profile{
    display:flex;
    align-items:center;
    gap:12px;
    margin-bottom:20px;
    padding-bottom:15px;
    border-bottom:1px solid #333;
}

.profile-pic{
    width:45px;
    height:45px;
    border-radius:50%;
    object-fit:cover;
    border:2px solid #9eff00;
}

.user-name{
    font-weight:bold;
    font-size:16px;
}

.edit-profile{
    font-size:12px;
    color:#9eff00;
}















</style>

<head>
<body>


<div class="top-bar">

<a href="#" class="nav-btn">Home</a>
<a href="{{ url_for('pricing') }}" class="nav-btn">Pricing</a>
<a href="{{ url_for('download') }}" class="nav-btn">Download</a>
<a href="#" class="nav-btn">About</a>

<input type="text" class="search" placeholder="Search">

<span class="logo">Content Hive</span>

</div>


<div class="main">

<!-- SIDEBAR -->
<div class="sidebar">

    <div class="user-profile">
        <img src="{{ url_for('static', filename=user['profile_pic'] if user['profile_pic'] else 'default.png') }}" class="profile-pic">
        <div>
            <div class="user-name">{{ user['name'] }}</div>
            <a href="{{ url_for('profile') }}" class="edit-profile">Edit Profile</a>
        </div>
    </div>


<a href="#" class="active"><button>My Library</button></a>
<a href="{{ url_for('item') }}" ><button>Smart Feed</button></a>
<a href="{{ url_for('schedule') }}"><button>Scheduling</button></a>
<a href="{{ url_for('save') }}"><button>Save</button></a>
<a href="{{ url_for('setting') }}"><button>Settings</button></a>
<a href="{{ url_for('privacy') }}"><button >Privacy</button></a>
<a href="{{ url_for('terms') }}"><button>Terms of Service</button></a>


<button class="upgrade-btn">UPGRADE TO PRO</button>
<a href="{{ url_for('logout') }}"><button >Logout</button></a>
</div>


<!-- CONTENT -->































        
        

</body>
</html>
