<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Notes</title>

<style>
body{
  font-family:Arial;
  background:#121212;
  color:white;
  padding:30px;
}

h1{
  color:#9eff00;
  margin-bottom:20px;
}

.search-box{
  width:100%;
  padding:10px;
  margin-bottom:20px;
  border-radius:8px;
  border:1px solid #333;
  background:#1c1c1c;
  color:white;
}

.notes-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(250px,1fr));
  gap:20px;
}

.note{
  background:#1c1c1c;
  padding:20px;
  border-radius:12px;
  border:1px solid #2a2a2a;
}

.note h3{
  color:#9eff00;
}

.actions{
  margin-top:10px;
  display:flex;
  justify-content:space-between;
}

a{
  color:#9eff00;
  text-decoration:none;
}

.back-btn{
  display:inline-block;
  margin-bottom:15px;
  padding:8px 14px;
  background:#1c1c1c;
  border:1px solid #333;
  border-radius:8px;
  color:#9eff00;
  text-decoration:none;
  transition:0.2s;
}

.back-btn:hover{
  background:#9eff00;
  color:black;
}









</style>

</head>
<body>

<h1>My Notes</h1>
<a href="{{ url_for('save_notes') }}" class="back-btn">← Back</a>

<form method="GET">
  <input class="search-box" type="text" name="q" placeholder="Search notes...">
</form>

<div class="notes-grid">

{% for note in notes %}
<div class="note">
  <h3>{{ note['title'] }}</h3>
  <p>{{ note['content'][:100] }}...</p>

  <small>{{ note['tags'] }}</small>

  <div class="actions">
    <a href="{{ url_for('edit_note', id=note['id']) }}">Edit</a>
    <a href="{{ url_for('delete_note', id=note['id']) }}">Delete</a>
  </div>
</div>
{% endfor %}

</div>

</body>
</html>
