<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Save Notes</title>

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, sans-serif;
background:#121212;
color:#f0f0f0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* CONTAINER */
.notes-box{
width:600px;
background:#1c1c1c;
padding:30px;
border-radius:16px;
border:1px solid #2a2a2a;
box-shadow:0 0 25px rgba(158,255,0,0.1);
}

/* TITLE */
h1{
color:#9eff00;
margin-bottom:20px;
text-align:center;
}

/* INPUTS */
input, textarea{
width:100%;
padding:12px;
margin-bottom:15px;
border-radius:8px;
border:1px solid #333;
background:#111;
color:white;
outline:none;
}

textarea{
resize:none;
}

/* BUTTON */
button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#9eff00;
color:black;
font-weight:bold;
cursor:pointer;
transition:0.2s;
}

button:hover{
opacity:0.8;
}

/* BACK LINK */
.back{
display:block;
text-align:center;
margin-top:15px;
color:#9eff00;
text-decoration:none;
}

.back:hover{
text-decoration:underline;
}

</style>

</head>

<body>

<div class="notes-box">

  <h1>Save Notes</h1>

  <form method="POST" action="/save_notes">

    <input type="text" name="title" placeholder="Note Title" required>

    <textarea name="content" rows="6" placeholder="Write your notes here..." required></textarea>

    <input type="text" name="tags" placeholder="Tags (comma separated)">

    <button type="submit">Save Note</button>

  </form>

  <a href="{{ url_for('save') }}" class="back">← Back</a>

</div>

</body>
</html>
