<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ContentHub Setup</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#121212;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
color:white;
}

.card{
background:#1e1e1e;
width:420px;
padding:40px;
border-radius:16px;
border:1px solid #2c2c2c;
text-align:center;
}

.step{
color:#9ca3af;
font-size:14px;
margin-bottom:10px;
}

.progress{
background:#2f2f2f;
height:8px;
border-radius:20px;
margin-bottom:25px;
overflow:hidden;
}

.progress-bar{
width:25%;
height:100%;
background:#9eff00;
}

.title{
font-size:28px;
font-weight:700;
margin-bottom:8px;
}

.subtitle{
color:#9ca3af;
margin-bottom:30px;
}

.btn{
display:flex;
align-items:center;
justify-content:center;
gap:12px;
background:#2b2b2b;
border:1px solid #3a3a3a;
border-radius:10px;
height:50px;
color:white;
font-size:15px;
font-weight:500;
cursor:pointer;
transition:0.2s;
margin-bottom:15px;
}

.btn:hover{
background:#333;
}

.btn img{
width:20px;
height:20px;
}
a.btn{
text-decoration:none;
}

</style>
</head>

<body>
    <div class="card">
    
    <div class="step">Step 1 of 4</div>
    
    <div class="progress">
    <div class="progress-bar"></div>
    </div>
    
    <div class="title">Welcome to ContentHub</div>
    <div class="subtitle">Let's get you set up.</div>
    
    <a href="#" class="btn">
    <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/google/google-original.svg">
    <span>Continue with Google</span>
    </a>
    <a href="{{ url_for('create') }}" class="btn">
    <img src="https://cdn-icons-png.flaticon.com/512/561/561127.png">
    <span>Continue with Email</span>
    </a>
    
    </div>

</body>
</html>
